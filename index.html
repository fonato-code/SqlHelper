<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SqlHelp — Editor de colunas (sp_help)</title>
  <script>
    (function () {
      var t = localStorage.getItem('sqlhelp-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link href="src/css/bootsrtap-v5.3.8.css" rel="stylesheet">
  <link href="src/fontawesome5pro/fontawesome-pro-5.8.2.css" rel="stylesheet">
  <style>
    :root,
    [data-theme="light"] {
      --sqlhelp-header-bg: #1e3a5f;
      --sqlhelp-header-end: #2d5a87;
      --bg-body: #f4f6f9;
      --bg-card: #ffffff;
      --bg-card-header: #ffffff;
      --bg-table-head: #f8f9fa;
      --bg-input: #ffffff;
      --text-main: #212529;
      --text-muted: #6c757d;
      --border: #dee2e6;
      --row-new: rgba(255, 193, 7, 0.35);
      --row-modified: rgba(13, 202, 240, 0.2);
      --row-deleted: rgba(220, 53, 69, 0.2);
      --sql-bg: #1e1e1e;
      --sql-color: #d4d4d4;
      --theme-toggle-bg: rgba(255, 255, 255, 0.12);
      --theme-toggle-border: rgba(255, 255, 255, 0.35);
      --theme-toggle-color: #fff;
    }

    [data-theme="dark"] {
      --sqlhelp-header-bg: #0f2744;
      --sqlhelp-header-end: #1a3d66;
      --bg-body: #0f1117;
      --bg-card: #1a1d24;
      --bg-card-header: #22262f;
      --bg-table-head: #252a34;
      --bg-input: #2a2f3a;
      --text-main: #e8eaed;
      --text-muted: #9aa0a6;
      --border: #3c424d;
      --row-new: rgba(255, 193, 7, 0.12);
      --row-modified: rgba(13, 202, 240, 0.12);
      --row-deleted: rgba(220, 53, 69, 0.15);
      --sql-bg: #0d0d0d;
      --sql-color: #d4d4d4;
      --theme-toggle-bg: rgba(255, 255, 255, 0.08);
      --theme-toggle-border: rgba(255, 255, 255, 0.25);
      --theme-toggle-color: #e8eaed;
    }

    body {
      background: var(--bg-body);
      color: var(--text-main);
      min-height: 100vh;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .app-header {
      background: linear-gradient(135deg, var(--sqlhelp-header-bg), var(--sqlhelp-header-end));
      color: #fff;
    }

    .theme-toggle-btn {
      background: var(--theme-toggle-bg);
      border: 1px solid var(--theme-toggle-border);
      color: var(--theme-toggle-color);
    }

    .theme-toggle-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.5);
    }

    .card {
      background: var(--bg-card);
      border-color: var(--border);
      color: var(--text-main);
    }

    .card-header:not(.bg-primary) {
      background: var(--bg-card-header) !important;
      border-color: var(--border);
      color: var(--text-main);
    }

    .table {
      --bs-table-bg: transparent;
      --bs-table-color: var(--text-main);
      --bs-table-border-color: var(--border);
      color: var(--text-main);
    }

    .table thead th,
    .table-light {
      --bs-table-bg: var(--bg-table-head);
      --bs-table-color: var(--text-main);
      background-color: var(--bg-table-head) !important;
      color: var(--text-main) !important;
      border-color: var(--border) !important;
    }

    .table-hover > tbody > tr:hover > * {
      --bs-table-bg-state: var(--bg-table-head);
      color: var(--text-main);
    }

  tr.table-warning > * { background-color: var(--row-new) !important; }
    tr.table-info > * { background-color: var(--row-modified) !important; }
    tr.table-danger > * { background-color: var(--row-deleted) !important; }

    .form-control,
    .form-select {
      background-color: var(--bg-input);
      border-color: var(--border);
      color: var(--text-main);
    }

    .form-control:focus,
    .form-select:focus {
      background-color: var(--bg-input);
      color: var(--text-main);
    }

    .form-control:disabled,
    .form-select:disabled {
      background-color: var(--bg-table-head);
      color: var(--text-muted);
    }

    .text-muted { color: var(--text-muted) !important; }
    .list-group-item {
      background: var(--bg-card);
      border-color: var(--border);
      color: var(--text-main);
    }

    .mono {
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.85rem;
    }

    .paste-area {
      min-height: 220px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.8rem;
      line-height: 1.35;
    }

    .sql-output {
      min-height: 180px;
      max-height: 420px;
      overflow: auto;
      white-space: pre-wrap;
      background: var(--sql-bg);
      color: var(--sql-color);
      border-radius: 0.375rem;
      padding: 1rem;
    }

    .col-actions { white-space: nowrap; }

    .table-responsive-columns th {
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .badge-changed { font-size: 0.7rem; }
    .section-icon { width: 1.25rem; text-align: center; }

    [data-theme="dark"] .alert-warning {
      background-color: #3d3216;
      border-color: #5c4a1a;
      color: #f5e6b8;
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="app-header py-3 mb-4 shadow-sm">
      <div class="container-fluid px-4">
        <div class="d-flex align-items-center gap-3 w-100">
          <i class="fal fa-database fa-2x"></i>
          <div class="flex-grow-1">
            <h1 class="h4 mb-0">SqlHelp</h1>
            <p class="mb-0 small opacity-75">Editor de colunas a partir do retorno de <code class="text-white">sp_help</code></p>
          </div>
          <button type="button" class="btn btn-sm theme-toggle-btn"
                  @click="toggleTheme"
                  :title="theme === 'dark' ? 'Alternar para tema claro' : 'Alternar para tema escuro'">
            <i class="fal" :class="theme === 'dark' ? 'fa-sun' : 'fa-moon'"></i>
            <span class="ms-1 d-none d-sm-inline">{{ theme === 'dark' ? 'Claro' : 'Escuro' }}</span>
          </button>
        </div>
      </div>
    </header>

    <main class="container-fluid px-4 pb-5">
      <!-- Entrada -->
      <section class="card shadow-sm mb-4" v-if="!parsed">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="fal fa-paste section-icon text-primary"></i>
          <strong>Cole o resultado de sp_help</strong>
        </div>
        <div class="card-body">
          <p class="text-muted small mb-2">
            Exemplo: <code>EXEC sp_help 'dbo.ano'</code> — cole todo o texto retornado abaixo.
          </p>
          <textarea
            class="form-control paste-area"
            v-model="rawInput"
            placeholder="Cole aqui o texto retornado pelo sp_help..."
            spellcheck="false"
          ></textarea>
          <div class="d-flex flex-wrap gap-2 mt-3">
            <button type="button" class="btn btn-primary" @click="parseInput" :disabled="!rawInput.trim()">
              <i class="fal fa-search me-1"></i> Analisar
            </button>
            <button type="button" class="btn btn-outline-secondary" @click="loadSample">
              <i class="fal fa-file-code me-1"></i> Carregar exemplo
            </button>
          </div>
          <div v-if="parseError" class="alert alert-danger mt-3 mb-0">
            <i class="fal fa-exclamation-triangle me-1"></i> {{ parseError }}
          </div>
        </div>
      </section>

      <!-- Editor -->
      <template v-if="parsed">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
          <button type="button" class="btn btn-outline-secondary btn-sm" @click="reset">
            <i class="fal fa-arrow-left me-1"></i> Voltar e colar outro
          </button>
          <span class="text-muted small" v-if="completionTime">
            <i class="fal fa-clock me-1"></i> {{ completionTime }}
          </span>
        </div>

        <!-- Metadados da tabela -->
        <section class="card shadow-sm mb-4">
          <div class="card-header d-flex align-items-center gap-2">
            <i class="fal fa-table section-icon text-primary"></i>
            <strong>Tabela</strong>
          </div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-2">
                <label class="form-label small text-muted">Schema</label>
                <input type="text" class="form-control form-control-sm mono" v-model="table.schema">
              </div>
              <div class="col-md-3">
                <label class="form-label small text-muted">Nome</label>
                <input type="text" class="form-control form-control-sm mono" v-model="table.name">
              </div>
              <div class="col-md-2">
                <label class="form-label small text-muted">Owner</label>
                <input type="text" class="form-control form-control-sm mono" readonly :value="table.owner">
              </div>
              <div class="col-md-2">
                <label class="form-label small text-muted">Tipo</label>
                <input type="text" class="form-control form-control-sm mono" readonly :value="table.type">
              </div>
              <div class="col-md-3">
                <label class="form-label small text-muted">Criada em</label>
                <input type="text" class="form-control form-control-sm mono" readonly :value="table.created">
              </div>
            </div>
            <p class="mb-0 mt-2 small text-muted mono">
              Objeto: [{{ table.schema }}].[{{ table.name }}]
            </p>
            <div class="form-check mt-3 mb-0" v-if="hasIdentityColumn">
              <input type="checkbox" class="form-check-input" id="reseedIdentity" v-model="reseedIdentity">
              <label class="form-check-label" for="reseedIdentity">
                <i class="fal fa-redo me-1"></i> Reseed identity
              </label>
              <p class="small text-muted mb-0 ms-4">
                Gera <code>DBCC CHECKIDENT</code> com o maior valor atual da coluna identity
                <span v-if="identityColumns.length">({{ identityColumns.map(c => c.name).join(', ') }})</span>,
                para que o próximo <code>INSERT</code> seja <strong>MAX + increment</strong> (ex.: seed 1001 e MAX 5 → próximo 6).
              </p>
            </div>
            <p v-else class="small text-muted mb-0 mt-3">
              <i class="fal fa-info-circle me-1"></i> Nenhuma coluna identity — reseed não disponível.
            </p>
          </div>
        </section>

        <!-- Colunas -->
        <section class="card shadow-sm mb-4">
          <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-2">
            <div class="d-flex align-items-center gap-2">
              <i class="fal fa-columns section-icon text-success"></i>
              <strong>Colunas</strong>
              <span class="badge bg-secondary">{{ columns.length }}</span>
            </div>
            <button type="button" class="btn btn-sm btn-outline-success" @click="addColumn">
              <i class="fal fa-plus me-1"></i> Nova coluna
            </button>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive table-responsive-columns">
              <table class="table table-hover table-sm mb-0 align-middle">
                <thead class="table-light">
                  <tr>
                    <th style="width:2rem"></th>
                    <th>Nome</th>
                    <th>Tipo SQL</th>
                    <th style="width:5rem">Tamanho</th>
                    <th style="width:4rem">Prec</th>
                    <th style="width:4rem">Scale</th>
                    <th style="width:5rem">Nulo</th>
                    <th style="width:5rem">Identity</th>
                    <th style="min-width:10rem">Default</th>
                    <th>Subst. NULL</th>
                    <th style="width:3rem"></th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="(col, idx) in columns" :key="col._id"
                      :class="{ 'table-warning': col._status === 'new', 'table-info': col._status === 'modified' && !col._deleted, 'table-danger': col._deleted }">
                    <td class="text-center">
                      <span v-if="col._status === 'new'" class="badge bg-success badge-changed" title="Nova">N</span>
                      <span v-else-if="col._deleted" class="badge bg-danger badge-changed" title="Remover">−</span>
                      <span v-else-if="col._status === 'modified'" class="badge bg-info text-dark badge-changed" title="Alterada">Δ</span>
                    </td>
                    <td>
                      <input type="text" class="form-control form-control-sm mono"
                             v-model="col.name" :disabled="col._deleted"
                             @input="markModified(col)">
                    </td>
                    <td>
                      <select class="form-select form-select-sm mono"
                              v-model="col.type" :disabled="col._deleted"
                              @change="onTypeChange(col)">
                        <option v-for="t in sqlTypes" :key="t" :value="t">{{ t }}</option>
                      </select>
                    </td>
                    <td>
                      <input type="text" class="form-control form-control-sm mono"
                             v-model="col.lengthDisplay" :disabled="col._deleted || !colNeedsLength(col.type)"
                             :placeholder="colNeedsLength(col.type) ? 'MAX ou nº' : '—'"
                             @input="onLengthInput(col)">
                    </td>
                    <td>
                      <input type="number" class="form-control form-control-sm mono"
                             v-model.number="col.prec" :disabled="col._deleted || !colNeedsPrecScale(col.type)"
                             min="1" max="38" @input="markModified(col)">
                    </td>
                    <td>
                      <input type="number" class="form-control form-control-sm mono"
                             v-model.number="col.scale" :disabled="col._deleted || !colNeedsPrecScale(col.type)"
                             min="0" max="38" @input="markModified(col)">
                    </td>
                    <td class="text-center">
                      <input type="checkbox" class="form-check-input"
                             :checked="col.nullable"
                             :disabled="col._deleted || col.isIdentity"
                             @change="col.nullable = $event.target.checked; markModified(col)">
                    </td>
                    <td class="text-center">
                      <input type="checkbox" class="form-check-input"
                             :checked="col.isIdentity"
                             :disabled="col._deleted"
                             @change="toggleIdentity(col, $event.target.checked)">
                    </td>
                    <td>
                      <div class="d-flex flex-column gap-1">
                        <div class="form-check mb-0">
                          <input type="checkbox" class="form-check-input"
                                 :id="'def-' + col._id"
                                 :checked="col.hasDefault"
                                 :disabled="col._deleted"
                                 @change="toggleDefault(col, $event.target.checked)">
                          <label class="form-check-label small" :for="'def-' + col._id">Default</label>
                        </div>
                        <template v-if="col.hasDefault">
                          <input type="text" class="form-control form-control-sm mono"
                                 v-model="col.defaultValue" :disabled="col._deleted"
                                 placeholder="Valor: ((0)), getdate()"
                                 @input="markModified(col)">
                          <input type="text" class="form-control form-control-sm mono"
                                 v-model="col.defaultConstraintName" :disabled="col._deleted"
                                 placeholder="Nome: DF_TABELA_COL"
                                 @input="markModified(col)">
                        </template>
                      </div>
                    </td>
                    <td>
                      <input type="text" class="form-control form-control-sm mono"
                             v-model="col.nullReplacement" :disabled="col._deleted || !needsNullReplacement(col)"
                             :title="needsNullReplacement(col) ? 'Valor para UPDATE WHERE coluna IS NULL antes do NOT NULL' : 'Disponível ao alterar de NULL para NOT NULL'"
                             placeholder="ex: 0, '', getdate()"
                             @input="markModified(col)">
                    </td>
                    <td class="col-actions">
                      <button type="button" class="btn btn-sm btn-outline-danger"
                              :title="col._deleted ? 'Desfazer remoção' : 'Remover coluna'"
                              @click="toggleDelete(col)">
                        <i :class="col._deleted ? 'fal fa-undo' : 'fal fa-trash-alt'"></i>
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <p class="small text-muted px-3 py-2 mb-0">
              <i class="fal fa-info-circle me-1"></i>
              FK e índices não-PK exigem revisão manual no script gerado.
              Ao mudar <strong>NULL → NOT NULL</strong>, preencha <strong>Subst. NULL</strong> para gerar o <code>UPDATE</code> antes do <code>ALTER COLUMN</code>.
            </p>
          </div>
        </section>

        <!-- Primary Key -->
        <section class="card shadow-sm mb-4">
          <div class="card-header d-flex align-items-center gap-2">
            <i class="fal fa-key section-icon text-warning"></i>
            <strong>Primary Key</strong>
          </div>
          <div class="card-body">
            <div class="form-check mb-3">
              <input type="checkbox" class="form-check-input" id="pkEnabled" v-model="primaryKey.enabled"
                     @change="onPrimaryKeyToggle">
              <label class="form-check-label" for="pkEnabled">Tabela possui primary key</label>
            </div>
            <template v-if="primaryKey.enabled">
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label small text-muted">Nome da constraint</label>
                  <input type="text" class="form-control form-control-sm mono"
                         v-model="primaryKey.name" placeholder="ex: PK_dbo_ANO"
                </div>
                <div class="col-md-6 d-flex align-items-end">
                  <div class="form-check mb-2">
                    <input type="checkbox" class="form-check-input" id="pkClustered"
                           v-model="primaryKey.clustered">
                    <label class="form-check-label" for="pkClustered">CLUSTERED</label>
                  </div>
                </div>
              </div>
              <label class="form-label small text-muted mb-2">Colunas da chave (ordem de seleção)</label>
              <div class="d-flex flex-wrap gap-2 mb-2">
                <label v-for="col in pkSelectableColumns" :key="col._id"
                       class="btn btn-sm"
                       :class="isPkColumnSelected(col.name) ? 'btn-warning' : 'btn-outline-secondary'">
                  <input type="checkbox" class="form-check-input me-1 d-inline-block"
                         :checked="isPkColumnSelected(col.name)"
                         @change="togglePkColumn(col.name, $event.target.checked)">
                  <span class="mono">{{ col.name }}</span>
                </label>
              </div>
              <p v-if="primaryKey.columns.length" class="small mono mb-0 text-muted">
                Ordem: {{ primaryKey.columns.join(', ') }}
                <button type="button" class="btn btn-link btn-sm p-0 ms-2" v-if="primaryKey.columns.length > 1"
                        @click="movePkColumn(-1)">↑ subir última</button>
                <button type="button" class="btn btn-link btn-sm p-0 ms-1" v-if="primaryKey.columns.length > 1"
                        @click="movePkColumn(1)">↓ descer primeira</button>
              </p>
              <p v-else class="small text-warning mb-0">
                <i class="fal fa-exclamation-triangle me-1"></i> Selecione ao menos uma coluna.
              </p>
            </template>
          </div>
        </section>

        <!-- Informações somente leitura -->
        <div class="row g-4 mb-4">
          <div class="col-lg-6" v-if="nonPkIndexes.length">
            <section class="card shadow-sm h-100">
              <div class="card-header">
                <i class="fal fa-list section-icon text-secondary"></i>
                <strong>Índices</strong>
              </div>
              <ul class="list-group list-group-flush small mono">
                <li class="list-group-item" v-for="(ix, i) in nonPkIndexes" :key="i">
                  <strong>{{ ix.index_name }}</strong> — {{ ix.index_keys }}
                </li>
              </ul>
            </section>
          </div>
          <div class="col-lg-6" v-if="otherConstraints.length">
            <section class="card shadow-sm h-100">
              <div class="card-header">
                <i class="fal fa-link section-icon text-secondary"></i>
                <strong>Outras restrições</strong>
              </div>
              <ul class="list-group list-group-flush small">
                <li class="list-group-item" v-for="(c, i) in otherConstraints" :key="i">{{ c }}</li>
              </ul>
            </section>
          </div>
        </div>

        <!-- Gerar SQL -->
        <section class="card shadow-sm border-primary">
          <div class="card-header bg-primary text-white d-flex flex-wrap justify-content-between align-items-center gap-2">
            <div>
              <i class="fal fa-file-export me-1"></i>
              <strong>Script SQL</strong>
            </div>
            <div class="d-flex gap-2">
              <button type="button" class="btn btn-sm btn-light" @click="generateScript">
                <i class="fal fa-sync me-1"></i> Gerar / Atualizar
              </button>
              <button type="button" class="btn btn-sm btn-outline-light" @click="copyScript" :disabled="!generatedSql">
                <i class="fal fa-copy me-1"></i> Copiar
              </button>
            </div>
          </div>
          <div class="card-body">
            <p v-if="!generatedSql" class="text-muted mb-2 small">
              Clique em <strong>Gerar / Atualizar</strong> para montar os comandos <code>ALTER TABLE</code> com base nas alterações.
            </p>
            <pre class="sql-output mono mb-0" v-show="generatedSql">{{ generatedSql }}</pre>
            <div v-if="scriptWarnings.length" class="alert alert-warning mt-3 mb-0 small">
              <strong><i class="fal fa-exclamation-triangle me-1"></i> Atenção:</strong>
              <ul class="mb-0 mt-1">
                <li v-for="(w, i) in scriptWarnings" :key="i">{{ w }}</li>
              </ul>
            </div>
          </div>
        </section>
      </template>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div class="toast align-items-center text-bg-success border-0" ref="toastEl" role="alert">
        <div class="d-flex">
          <div class="toast-body">
            <i class="fal fa-check me-1"></i> {{ toastMessage }}
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
    </div>
  </div>

  <script src="src/js/vue.js"></script>
  <script src="src/js/bootstrap-v5.3.8.js"></script>
  <script>
    const { createApp } = Vue;

    const SAMPLE_SP_HELP = `Name                                                                                                                             Owner                                                                                                                            Type                            Created_datetime
-------------------------------------------------------------------------------------------------------------------------------- -------------------------------------------------------------------------------------------------------------------------------- ------------------------------- -----------------------
ANO                                                                                                                              dbo                                                                                                                              user table                      2026-05-11 15:59:30.080

 
 
Column_name                                                                                                                      Type                                                                                                                             Computed                            Length      Prec  Scale Nullable                            TrimTrailingBlanks                  FixedLenNullInSource                Collation
-------------------------------------------------------------------------------------------------------------------------------- -------------------------------------------------------------------------------------------------------------------------------- ----------------------------------- ----------- ----- ----- ----------------------------------- ----------------------------------- ----------------------------------- --------------------------------------------------------------------------------------------------------------------------------
CD_ANO                                                                                                                           int                                                                                                                              no                                  4           10    0     no                                  (n/a)                               (n/a)                               NULL
ANO                                                                                                                              int                                                                                                                              no                                  4           10    0     yes                                 (n/a)                               (n/a)                               NULL
CD_STATUS                                                                                                                        bit                                                                                                                              no                                  1                       yes                                 (n/a)                               (n/a)                               NULL
DH_TIMESTAMP                                                                                                                     datetime                                                                                                                         no                                  8                       yes                                 (n/a)                               (n/a)                               NULL

 
Identity                                                                                                                         Seed                                    Increment                               Not For Replication
-------------------------------------------------------------------------------------------------------------------------------- --------------------------------------- --------------------------------------- -------------------

              lines.push('GO');
              if (col.isIdentity && !orig.isIdentity) {
                warnings.push(`Identity em [${col.name}]: ALTER COLUMN não cria identity. Use criação de coluna nova ou recriação da tabela.`);
              }
              if (orig.isIdentity && !col.isIdentity) {
                warnings.push(`Remover identity de [${col.name}] exige script adicional (não gerado automaticamente).`);
              }
            }

            if (defChanged) {
              hasChanges = true;
              const hadDefault = !!orig.hasDefault && orig.defaultConstraintName;
              const wantDefault = !!col.hasDefault && col.defaultValue && col.defaultValue.trim();
              if (hadDefault && (!wantDefault || orig.defaultConstraintName !== col.defaultConstraintName ||
                  (orig.defaultValue || '') !== (col.defaultValue || ''))) {
                lines.push(`ALTER TABLE ${qTable} DROP CONSTRAINT [${orig.defaultConstraintName}];`);
                lines.push('GO');
              }
              if (wantDefault) {
                const defName = (col.defaultConstraintName && col.defaultConstraintName.trim()) ||
                  `DF_${table}_${col.name}`.replace(/[^a-zA-Z0-9_]/g, '_');
                if (!hadDefault || orig.defaultConstraintName !== col.defaultConstraintName ||
                    (orig.defaultValue || '') !== (col.defaultValue || '')) {
                  lines.push(`ALTER TABLE ${qTable} ADD CONSTRAINT [${defName}] DEFAULT ${col.defaultValue.trim()} FOR [${col.name}];`);
                  lines.push('GO');
                }
              } else if (col.hasDefault && !(col.defaultValue && col.defaultValue.trim())) {
                warnings.push(`Coluna [${col.name}]: default marcado sem valor — informe o valor ou desmarque o checkbox.`);
              }
            }
            if (col.isIdentity !== orig.isIdentity ||
              col.identitySeed !== orig.identitySeed ||
              col.identityIncrement !== orig.identityIncrement) {
              if (col.isIdentity !== orig.isIdentity) {
                warnings.push('Alterações de IDENTITY não são aplicadas automaticamente neste script.');
              }
            }
            lines.push('');
          }

          // Novas colunas
          for (const col of this.columns.filter(c => c._status === 'new' && !c._deleted)) {
            hasChanges = true;
            const typeSql = buildTypeSql(col);
            const nullSql = col.nullable ? 'NULL' : 'NOT NULL';
            let line = `ALTER TABLE ${qTable} ADD [${col.name}] ${typeSql} ${nullSql}`;
            if (col.isIdentity) {
              line += ` IDENTITY(${col.identitySeed || 1}, ${col.identityIncrement || 1})`;
              warnings.push(`Nova coluna identity [${col.name}]: só é permitida em tabela vazia ou com cuidado extra.`);
            }
            line += ';';
            lines.push(line);
            lines.push('GO');
            if (col.hasDefault && col.defaultValue && col.defaultValue.trim()) {
              const defName = (col.defaultConstraintName && col.defaultConstraintName.trim()) ||
                `DF_${table}_${col.name}`.replace(/[^a-zA-Z0-9_]/g, '_');
              lines.push(`ALTER TABLE ${qTable} ADD CONSTRAINT [${defName}] DEFAULT ${col.defaultValue.trim()} FOR [${col.name}];`);
              lines.push('GO');
            }
            lines.push('');
          }

          if (this.primaryKey.enabled && (this.primaryKeyChanged() || this.needsDropPrimaryKeyFirst())) {
            const validCols = this.primaryKey.columns.filter(cn => {
              const col = this.columns.find(c => c.name === cn && !c._deleted);
              return !!col;
            });
            const invalid = this.primaryKey.columns.filter(cn => !validCols.includes(cn));
            if (invalid.length) {
              warnings.push(`PK: colunas inválidas ou removidas (${invalid.join(', ')}). Atualize a seleção.`);
            }
            if (validCols.length) {
              hasChanges = true;
              const pkType = this.primaryKey.clustered ? 'CLUSTERED' : 'NONCLUSTERED';
              const colsSql = validCols.map(c => `[${c}]`).join(', ');
              const pkName = (this.primaryKey.name && this.primaryKey.name.trim()) ||
                `PK_${schema}_${table}`.replace(/[^a-zA-Z0-9_]/g, '_');
              lines.push('-- Primary Key');
              lines.push(`ALTER TABLE ${qTable} ADD CONSTRAINT [${pkName}] PRIMARY KEY ${pkType} (${colsSql});`);
              lines.push('GO');
              lines.push('');
            } else if (this.primaryKey.enabled) {
              warnings.push('Primary Key ativa sem colunas válidas selecionadas.');
            }
          } else if (!this.primaryKey.enabled && origPk && origPk.enabled && this.primaryKeyChanged()) {
            hasChanges = true;
          }

          if (this.reseedIdentity) {
            const identityCols = this.identityColumns;
            if (!identityCols.length) {
              warnings.push('Reseed identity marcado, mas não há coluna identity na tabela.');
            } else {
              hasChanges = true;
              const fullTable = `${schema}.${table}`;
              lines.push('');
              lines.push('-- Reseed identity: próximo INSERT = MAX(coluna) + increment');
              for (const col of identityCols) {
                const varName = '@max_' + col.name.replace(/[^a-zA-Z0-9_]/g, '_');
                const sqlType = this.identityVarType(col);
                lines.push(`DECLARE ${varName} ${sqlType};`);
                lines.push(`SELECT ${varName} = ISNULL(MAX([${col.name}]), 0) FROM ${qTable};`);
                lines.push(`DBCC CHECKIDENT ('${fullTable}', RESEED, ${varName});`);
                lines.push('GO');
                lines.push('');
              }
            }
          }

          if (!hasChanges) {
            lines.push('-- Nenhuma alteração detectada em relação ao sp_help original.');
          } else {
            lines.push('-- Revise o script antes de executar em produção.');
          }

          this.generatedSql = lines.join('\n');
          this.scriptWarnings = warnings;
        },
        copyScript() {
          if (!this.generatedSql) return;
          navigator.clipboard.writeText(this.generatedSql).then(() => {
            this.showToast('Script copiado para a área de transferência.');
          }).catch(() => {
            this.showToast('Não foi possível copiar. Selecione o texto manualmente.');
          });
        },
        showToast(msg) {
          this.toastMessage = msg;
          const el = this.$refs.toastEl;
          if (el && window.bootstrap) {
            const t = bootstrap.Toast.getOrCreateInstance(el);
            t.show();
          }
        },
        applyTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme);
        },
        toggleTheme() {
          this.theme = this.theme === 'dark' ? 'light' : 'dark';
          this.applyTheme(this.theme);
          localStorage.setItem('sqlhelp-theme', this.theme);
        }
      },
      mounted() {
        this.applyTheme(this.theme);
      }
    }).mount('#app');
  </script>
</body>
</html>
