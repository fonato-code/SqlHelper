<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="src/js/sqlhelp-theme.js"></script>
  <link href="src/css/bootsrtap-v5.3.8.css" rel="stylesheet">
  <link href="src/fontawesome5pro/fontawesome-pro-5.8.2.css" rel="stylesheet">
  <link href="src/css/sqlhelp-common.css" rel="stylesheet">
  <link href="src/css/sqlhelp-queries.css" rel="stylesheet">
  <link id="hljs-light" href="src/css/highlight-github.css" rel="stylesheet" disabled>
  <link id="hljs-dark" href="src/css/highlight-github-dark.css" rel="stylesheet">
  <title>SqlHelp — Biblioteca de Queries T-SQL</title>
</head>
<body>
  <div id="app" v-cloak>
    <header class="app-header py-3 mb-4 shadow-sm">
      <div class="container-fluid px-4">
        <div class="d-flex align-items-center gap-3 w-100 flex-wrap">
          <i class="fal fa-book fa-2x"></i>
          <div class="flex-grow-1 min-width-0">
            <h1 class="h4 mb-0">SqlHelp — Queries T-SQL</h1>
            <p class="mb-0 small opacity-75">Biblioteca de consultas e scripts de apoio para SQL Server</p>
          </div>
          <nav class="sqlhelp-nav me-2">
            <ul class="nav nav-pills gap-1 mb-0 flex-wrap justify-content-end">
              <li class="nav-item"><a href="index.html" class="nav-link"><i class="fal fa-table me-1"></i>sp_help</a></li>
              <li class="nav-item"><a href="stats.html" class="nav-link"><i class="fal fa-tachometer-alt me-1"></i>IO / Time</a></li>
              <li class="nav-item"><a href="queries.html" class="nav-link active"><i class="fal fa-book me-1"></i>Queries</a></li>
              <li class="nav-item"><a href="compare.html" class="nav-link"><i class="fal fa-columns me-1"></i>Comparar TSV</a></li>
            </ul>
          </nav>
          <button type="button" class="btn btn-sm theme-toggle-btn"
                  @click="toggleTheme"
                  :title="theme === 'dark' ? 'Alternar para tema claro' : 'Alternar para tema escuro'">
            <i class="fal" :class="theme === 'dark' ? 'fa-sun' : 'fa-moon'"></i>
            <span class="ms-1 d-none d-sm-inline">{{ theme === 'dark' ? 'Claro' : 'Escuro' }}</span>
          </button>
        </div>
      </div>
    </header>

    <main class="container-fluid px-4 pb-5">
      <div class="row queries-layout g-3">
        <div class="col-lg-4 col-xl-3">
          <div class="queries-sidebar">
            <div class="queries-sidebar-search">
              <input type="search" class="form-control form-control-sm"
                     v-model="search" placeholder="Buscar por título ou tag...">
              <div class="small text-muted mt-2">
                {{ filteredTopics.length }} de {{ topics.length }} tópicos
              </div>
            </div>
            <div v-if="allTags.length" class="queries-sidebar-tags">
              <span class="queries-tag-chip"
                    :class="{ active: !activeTag }"
                    @click="activeTag = ''">Todas</span>
              <span v-for="tag in allTags" :key="tag"
                    class="queries-tag-chip"
                    :class="{ active: activeTag === tag }"
                    @click="toggleTag(tag)">{{ tag }}</span>
            </div>
            <div class="queries-sidebar-list list-group list-group-flush">
              <button v-for="t in filteredTopics" :key="t.id" type="button"
                      class="list-group-item list-group-item-action text-start"
                      :class="{ active: selectedId === t.id }"
                      @click="selectTopic(t)">
                <div class="fw-semibold">{{ t.title }}</div>
                <div v-if="t.tags && t.tags.length" class="small text-muted mt-1">
                  <span v-for="(tag, i) in t.tags" :key="tag">
                    <span v-if="i"> · </span>{{ tag }}
                  </span>
                </div>
              </button>
              <div v-if="!filteredTopics.length" class="p-3 small text-muted text-center">
                Nenhum tópico encontrado.
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-8 col-xl-9">
          <div class="queries-detail card shadow-sm" ref="detailPanel">
            <div v-if="!selectedTopic" class="queries-detail-empty">
              <i class="fal fa-hand-pointer fa-2x mb-3 opacity-50"></i>
              <p class="mb-0">Selecione um tópico na lista ao lado.</p>
            </div>
            <template v-else>
              <div class="card-header">
                <h2 class="h5 mb-2">{{ selectedTopic.title }}</h2>
                <div v-if="selectedTopic.tags && selectedTopic.tags.length" class="d-flex flex-wrap gap-1">
                  <span v-for="tag in selectedTopic.tags" :key="tag"
                        class="badge bg-secondary">{{ tag }}</span>
                </div>
              </div>
              <div class="card-body">
                <template v-for="block in renderedBlocks" :key="block.key">
                  <div v-if="block.type === 'md'"
                       class="query-doc"
                       v-html="block.html"></div>
                  <div v-else class="query-sql-block">
                    <div class="query-sql-header">
                      <span v-if="block.title" class="query-sql-title">{{ block.title }}</span>
                      <span v-else></span>
                      <button type="button" class="btn btn-sm btn-outline-primary"
                              @click="copySql(block.resolvedSql)">
                        <i class="fal fa-copy me-1"></i> Copiar
                      </button>
                    </div>
                    <div v-if="block.params && block.params.length" class="query-params">
                      <div class="query-params-title small text-muted mb-2">Parâmetros</div>
                      <div v-for="p in block.params" :key="p.paramKey" class="row g-2 mb-2 align-items-center">
                        <label class="col-sm-3 col-form-label col-form-label-sm mb-0"
                               :for="p.paramKey">{{ p.name }}</label>
                        <div class="col-sm-9">
                          <input v-if="p.type === 'number'"
                                 :id="p.paramKey"
                                 type="number"
                                 class="form-control form-control-sm"
                                 :value="paramValues[p.paramKey]"
                                 @input="setParamValue(p.paramKey, $event.target.value)">
                          <select v-else-if="p.type === 'array'"
                                  :id="p.paramKey"
                                  class="form-select form-select-sm"
                                  :value="paramValues[p.paramKey]"
                                  @change="setParamValue(p.paramKey, $event.target.value)">
                            <option v-for="opt in p.options" :key="opt" :value="opt">{{ opt }}</option>
                          </select>
                          <input v-else
                                 :id="p.paramKey"
                                 type="text"
                                 class="form-control form-control-sm"
                                 :value="paramValues[p.paramKey]"
                                 @input="setParamValue(p.paramKey, $event.target.value)">
                        </div>
                      </div>
                    </div>
                    <pre class="query-sql-pre"><code class="language-sql hljs" v-html="block.sqlHtml"></code></pre>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div class="toast align-items-center text-bg-success border-0" ref="toastEl" role="alert">
        <div class="d-flex">
          <div class="toast-body">
            <i class="fal fa-check me-1"></i> {{ toastMessage }}
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
    </div>
  </div>

  <script src="src/js/vue.js"></script>
  <script src="src/js/bootstrap-v5.3.8.js"></script>
  <script src="src/js/sqlhelp-ui.js"></script>
  <script src="src/js/marked.min.js"></script>
  <script src="src/js/highlight.min.js"></script>
  <script src="src/js/sqlhelp-markdown.js"></script>
  <script src="src/js/sqlhelp-query-params.js"></script>
  <script src="src/queries/topics-manifest.js"></script>
  <script src="src/queries/load-topics.js"></script>
  <script src="src/queries/catalog.js"></script>
  <script>
    (function () {
      var orig = SqlHelp.themeMixin.methods.applyTheme;
      SqlHelp.themeMixin.methods.applyTheme = function (theme) {
        orig.call(this, theme);
        var light = document.getElementById('hljs-light');
        var dark = document.getElementById('hljs-dark');
        if (light) light.disabled = theme === 'dark';
        if (dark) dark.disabled = theme !== 'dark';
      };
    })();
  </script>
  <script src="src/js/queries-app.js"></script>
</body>
</html>
